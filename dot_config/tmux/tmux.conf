# ══════════════════════════════════════════════════════════════════
#  TMUX CONFIG — Modern & Classic
#  Inspired by ThePrimeagen & DevOps Toolbox (omerxx)
#  Compatible with chezmoi dotfiles sync
# ══════════════════════════════════════════════════════════════════

# ─── GENERAL ──────────────────────────────────────────────────────

# Deja el prefix por defecto (C-b) y añade C-a como alternativa ergonómica
set -g prefix C-a
bind C-a send-prefix
# Para máquinas anidadas (tmux dentro de tmux), envía C-b real con C-b C-b
bind C-b send-prefix

# Recarga de config instantánea
bind r source-file ~/.config/tmux/tmux.conf \; display "⚡ Config reloaded"

# Indexado desde 1 (más lógico con el teclado)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Sin delay al pulsar Escape (crítico para nvim)
set -sg escape-time 0

# Historial de scrollback amplio
set -g history-limit 50000

# Tiempo de display de mensajes en ms
set -g display-time 2000

# Actualizaciones del status bar cada segundo
set -g status-interval 1

# Focus events: necesario para nvim autoread
set -g focus-events on

# Color del terminal — 256 colores + true color
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -ag terminal-overrides ",alacritty:RGB"
set -ag terminal-overrides ",kitty:RGB"

# Ratón: útil para resize de panes y scroll
set -g mouse on

# ─── VENTANAS & PANES ─────────────────────────────────────────────

# Nuevas ventanas/panes heredan el directorio actual
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# Splits más intuitivos con | y -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ─── NAVEGACIÓN ESTILO VIM ────────────────────────────────────────
# ThePrimeagen style: hjkl para moverse entre panes

bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Volver a la última ventana con ^
bind -r ^ last-window

# Resize de panes con HJKL (mayúsculas) — repeatable
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Maximizar/restaurar pane actual
bind -r m resize-pane -Z

# Mover entre ventanas con < y >
bind -r < swap-window -d -t -1
bind -r > swap-window -d -t +1

# ─── MODO COPIA (VI) ──────────────────────────────────────────────

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind-key -T copy-mode-vi 'H' send -X start-of-line
bind-key -T copy-mode-vi 'L' send -X end-of-line

# Scroll de ratón entra automáticamente en copy mode
bind -n WheelUpPane if-shell -F -t = "#{mouse_any_flag}" "send-keys -M" "if -Ft= '#{pane_in_mode}' 'send-keys -M' 'select-pane -t=; copy-mode -e; send-keys -M'"

# ─── SESIONES ─────────────────────────────────────────────────────

# ThePrimeagen's tmux-sessionizer (fzf + directorios)
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Nueva sesión rápida
bind-key N command-prompt -p "Nombre de sesión:" "new-session -s '%%'"

# Matar sesión actual y volver a la anterior
bind-key X confirm-before -p "¿Eliminar sesión '#{session_name}'? (y/n)" kill-session

# ─── LOOK & FEEL — Clásico pero limpio ────────────────────────────

# Modo de actividad silencioso
set -g visual-activity off
set -g visual-bell off
set -g visual-silence off
setw -g monitor-activity off
set -g bell-action none

# Bordes de panes
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour246"

# ─── STATUS BAR ───────────────────────────────────────────────────
# Estética clásica de tmux: fondo oscuro, texto verde/blanco

set -g status on
set -g status-position bottom
set -g status-justify left
set -g status-style "bg=colour235,fg=colour136"

# Lado izquierdo: sesión
set -g status-left-length 40
set -g status-left "#[bg=colour240,fg=colour255,bold] #S #[bg=colour235,fg=colour240]"

# Lado derecho: usuario@host | fecha | hora
set -g status-right-length 80
set -g status-right "#[fg=colour240,bg=colour235]#[fg=colour255,bg=colour240] #{b:pane_current_path} #[fg=colour235,bg=colour240]#[fg=colour240,bg=colour235]#[fg=colour245,bg=colour235] %d-%b  %H:%M "

# Ventanas
setw -g window-status-style "bg=colour235,fg=colour244"
setw -g window-status-format " #I:#W#F "

setw -g window-status-current-style "bg=colour240,fg=colour255,bold"
setw -g window-status-current-format " #[fg=colour215]#I#[fg=colour255]:#W#F "

# Mensaje de comandos
set -g message-style "bg=colour235,fg=colour166,bold"
set -g message-command-style "bg=colour235,fg=colour166"

# ─── PLUGINS (TPM) ────────────────────────────────────────────────
# Instalar TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

set -g @plugin 'tmux-plugins/tpm'

# Defaults razonables (sobrescribe algunos con nuestra config)
set -g @plugin 'tmux-plugins/tmux-sensible'

# Copiar al portapapeles del sistema con y en copy-mode
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_action 'copy-pipe-no-clear'    # no cancela la selección al copiar

# Persistencia de sesiones (guarda y restaura entre reinicios)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'   # restaura sesión de nvim

# Auto-guardado continuo (cada 15 min)
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Session manager con fzf preview (DevOps Toolbox / omerxx)
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'o'
set -g @sessionx-x-path '~/.config'
set -g @sessionx-window-height '70%'
set -g @sessionx-window-width '70%'
set -g @sessionx-zoxide-mode 'on'
set -g @sessionx-custom-paths-subdirectories 'false'
set -g @sessionx-filter-current 'false'

# Pane flotante (DevOps Toolbox / omerxx)
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-bind '-n M-p'              # Alt+P abre/cierra el pane flotante
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-text-color 'white'
set -g @floax-change-path 'true'

# Selección rápida de texto con hints (estilo easymotion)
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-command 'echo -n {} | xclip -selection clipboard'  # ajusta según tu OS

# Inicializar TPM — debe ser la ÚLTIMA línea
run '~/.tmux/plugins/tpm/tpm'
